<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --font: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Geist", sans-serif;
  --f: "Manrope", sans-serif;
  --text: #000;
  --pad: 3.23vw;
  --gap: 8px;
  --radius: 24px;
}
html, body {
  width: 100%;
  min-height: 100vh;
  background: #fff;
  font-family: var(--font);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  cursor: none;
}



/* PAGE */
.page {
  padding: var(--pad);
  padding-top: calc(2.96vh + clamp(18px, 1.25vw, 24px) + 48px);
}

/* TITLE */
.page-title {
  font-size: clamp(32px, 4.17vw, 80px);
  font-weight: 510;
  line-height: 120%;
  letter-spacing: -0.02em;
  margin-bottom: 40px;
}

/* GRID: 4 columns */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: calc((100vw - var(--pad) * 2 - var(--gap) * 3) / 4);
  gap: var(--gap);
}

/* CARDS */
.card {
  border-radius: var(--radius);
  overflow: hidden;
}
/* Spans */
.card.w2 { grid-column: span 2; }
.card.h2 { grid-row: span 2; }

/* Placeholder colors */
.card.c1 { background: #CECF40; }
.card.c2 { background: #1491D9; }
.card.c3 { background: #D62507; }
.card.c4 { background: #4CA4ED; }
.card.c5 { background: #A4A2A0; }
.card.c6 { background: #0A0A0A; }
.card.c7 { background: #F5F5F5; }
.card.c8 { background: #E8D5B7; }

/* CURSOR */
#cursor {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  top: 0; left: 0;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #CECF40;
  transform: translate(-50%, -50%);
  transition: width 0.2s ease, height 0.2s ease,
              border-radius 0.2s ease, opacity 0.2s ease;
  will-change: transform;
}
#cursor.large {
  width: 36px;
  height: 36px;
}

/* Highlight word */
.hl-wrap {
  position: relative;
  display: inline-block;
  white-space: nowrap;
  cursor: none;
}
.hl-bg {
  position: absolute;
  left: -0.1em; right: -0.1em;
  top: 0.18em;
  height: 0.88em;
  background: #4CA4ED;
  border-radius: 3px;
  transform: rotate(-1deg);
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}
.hl-txt {
  position: relative;
  z-index: 1;
  transition: color 0.2s ease;
}
.hl-wrap.active .hl-bg { opacity: 1; }
.hl-wrap.active .hl-txt { color: #F5F5F5; }

/* Email copy card */
#email-card { position: relative; }
#copy-text { transition: opacity 0.2s ease; }

#cursor.pill {
  width: 80px; height: 34px;
  border-radius: 100px;
  background: #CECF40;
  display: flex; align-items: center; justify-content: center;
}
#cursor.pill .cursor-label { opacity: 1; color: #000; font-size: 15px; }
#cursor .cursor-label {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: #000; opacity: 0; white-space: nowrap; letter-spacing: -0.01em;
  transition: opacity 0.15s ease;
}

#cursor.copied {
  width: 96px; height: 34px;
  border-radius: 100px;
  background: #CECF40;
  display: flex; align-items: center; justify-content: center;
}
#cursor.copied .cursor-label { opacity: 1; color: #000; font-size: 15px; }

/* Playground stickers */
@keyframes pg-float {
  0%   { transform: rotate(-8deg) translate(0,0); }
  50%  { transform: rotate(-8deg) translate(2px,-8px); }
  100% { transform: rotate(-8deg) translate(0,0); }
}
@keyframes pg-float2 {
  0%   { transform: rotate(-3deg) translate(0,0); }
  50%  { transform: rotate(-3deg) translate(-2px,-6px); }
  100% { transform: rotate(-3deg) translate(0,0); }
}
#coffee-card .pg-sticker { animation: pg-float 3.5s ease-in-out infinite; }
#sofa-card .pg-sticker { animation: pg-float2 4s ease-in-out infinite; }

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
const cursorEl = document.getElementById('cursor');
const cursorLabel = document.getElementById('cursor-label');

document.addEventListener('mousemove', (e) => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseleave', () => cursorEl.style.opacity = '0');
document.addEventListener('mouseenter', () => cursorEl.style.opacity = '1');

document.querySelectorAll('a, .card').forEach(el => {
  el.addEventListener('mouseenter', () => cursorEl.classList.add('large'));
  el.addEventListener('mouseleave', () => cursorEl.classList.remove('large'));
});

function runHatLoop() {} // replaced by static-aware version below

// hat loop started via toggleStatic setup above

// Highlight word hover
const hlWord = document.getElementById('hl-word');
if (hlWord) {
  hlWord.addEventListener('mouseenter', () => hlWord.classList.add('active'));
  hlWord.addEventListener('mouseleave', () => hlWord.classList.remove('active'));
  // cursor enlarge on hover
  hlWord.addEventListener('mouseenter', () => cursorEl.classList.add('large'));
  hlWord.addEventListener('mouseleave', () => cursorEl.classList.remove('large'));
}

// Button hover: cursor disappears, button rotates + scales
const demoBtn = document.getElementById('demo-btn');
if (demoBtn) {
  demoBtn.addEventListener('mouseenter', () => {
    cursorEl.style.opacity = '0';
    gsap.to(demoBtn, { duration: 0.5, rotation: 6, scale: 1.08, ease: 'power2.out' });
  });
  demoBtn.addEventListener('mouseleave', () => {
    cursorEl.style.opacity = '1';
    gsap.to(demoBtn, { duration: 0.35, rotation: 0, scale: 1, ease: 'power2.inOut' });
  });
}

// Static mode
let isStatic = false;
let hatTl = null;
window._stopPixel = null;  // pixel text loop stop flag

function toggleStatic() {
  isStatic = !isStatic;
  const btn = document.getElementById('static-btn');
  const hat = document.getElementById('hat-el');
  if (isStatic) {
    btn.style.background = '#000';
    btn.style.color = '#fff';
    // Snap hat to peak: scale 1, fully visible
    if (hatTl) {
      hatTl.pause();
      gsap.set(hat, { scale: 1, opacity: 1 });
    }
    window._pixelPaused = true;
    // Snap pixel text to fully assembled state
    window._pixelSnapToEnd && window._pixelSnapToEnd();
  } else {
    btn.style.background = 'none';
    btn.style.color = '#000';
    gsap.set(hat, { scale: 0, opacity: 0 });
    if (hatTl) { hatTl.restart(); }
    window._pixelPaused = false;
    if (window._restartPixel) window._restartPixel();
  }
}

window.addEventListener('load', () => {
  const hat = document.getElementById('hat-el');
  hatTl = gsap.timeline();
  hatTl.to(hat, { duration: 0.55, scale: 1, opacity: 1, ease: 'back.out(2.5)' });
});

// Email copy card
const emailCard = document.getElementById('email-card');
const copyText  = document.getElementById('copy-text');
let emailCopied = false;

if (emailCard) {
  emailCard.addEventListener('mouseenter', () => {
    if (emailCopied) return;
    cursorEl.classList.add('pill');
    cursorLabel.textContent = 'copy';
  });
  emailCard.addEventListener('mouseleave', () => {
    if (emailCopied) return;
    cursorEl.classList.remove('pill');
  });
  emailCard.addEventListener('click', async () => {
    if (emailCopied) return;
    try { await navigator.clipboard.writeText('chen_sixian@outlook.com'); }
    catch(e) {
      const ta = document.createElement('textarea');
      ta.value = 'chen_sixian@outlook.com';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    emailCopied = true;
    cursorEl.classList.remove('pill');
    cursorEl.classList.add('copied');
    cursorLabel.textContent = 'copied!';
    copyText.style.opacity = '0.3';
    setTimeout(() => {
      emailCopied = false;
      cursorEl.classList.remove('copied');
      copyText.style.opacity = '1';
      if (emailCard.matches(':hover')) {
        cursorEl.classList.add('pill');
        cursorLabel.textContent = 'copy';
      }
    }, 2000);
  });
}


// Egg hover
// Egg hover — once only (hover shows egg2, stays egg2, no more interaction)
const eggImg = document.getElementById('egg-img');
if (eggImg) {
  let eggDone = false;
  eggImg.addEventListener('mouseenter', () => {
    if (eggDone) return;
    eggImg.src = 'egg2-Photoroom.png';
    cursorEl.classList.add('large');
  });
  eggImg.addEventListener('mouseleave', () => {
    if (eggDone) return;
    eggImg.src = 'egg-Photoroom.png';
    cursorEl.classList.remove('large');
  });
  eggImg.addEventListener('click', () => {
    if (eggDone) return;
    eggDone = true;
    eggImg.src = 'egg2-Photoroom.png';
    eggImg.style.pointerEvents = 'none';
    cursorEl.classList.remove('large');
  });
}

// Tomato hover — use correct filename
const tomatoImg = document.getElementById('tomato-img');
if (tomatoImg) {
  tomatoImg.addEventListener('mouseenter', () => {
    tomatoImg.src = 'tomato2-Photoroom.png';
    cursorEl.classList.add('large');
  });
  tomatoImg.addEventListener('mouseleave', () => {
    tomatoImg.src = 'tomato.png';
    cursorEl.classList.remove('large');
  });
}


// ── PARTICLE CARD ──
(function() {
  const card = document.getElementById('particle-card');
  const canvas = document.getElementById('pg-particle-canvas');
  const pctx = canvas.getContext('2d');
  let pw, ph;
  const COUNT = 80;
  const pts = [];
  let lastMX = 0, lastMY = 0;
  let dX = 0, dY = 0;

  function resize() {
    const r = card.getBoundingClientRect();
    pw = r.width; ph = r.height;
    canvas.width  = pw * (window.devicePixelRatio || 1);
    canvas.height = ph * (window.devicePixelRatio || 1);
    canvas.style.width  = pw + 'px';
    canvas.style.height = ph + 'px';
    pctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  }

  class Dot {
    constructor() {
      this.x = Math.random() * pw;
      this.y = Math.random() * ph;
      this.size = Math.random() < 0.6 ? 2 : 3;
      this.alpha = 0.4 + Math.random() * 0.5;
      this.ax = 8 + Math.random() * 18;
      this.ay = 10 + Math.random() * 22;
      this.sx = 0.0003 + Math.random() * 0.0004;
      this.sy = 0.0002 + Math.random() * 0.0004;
      this.px = Math.random() * Math.PI * 2;
      this.py = Math.random() * Math.PI * 2;
      this.vx = 0; this.vy = 0;
      this.depth = 0.6 + Math.random() * 0.8;
    }
    update(t) {
      this.vx += dX * 0.15 * this.depth;
      this.vy += dY * 0.15 * this.depth;
      this.vx *= 0.97; this.vy *= 0.97;
      this.px += this.vx * 0.0001;
      this.py += this.vy * 0.0001;
      this.x += this.vx * 0.15;
      this.y += this.vy * 0.15;
      if (this.x < -10) this.x = pw + 10;
      if (this.x > pw + 10) this.x = -10;
      if (this.y < -10) this.y = ph + 10;
      if (this.y > ph + 10) this.y = -10;
      this.dx = this.x + Math.sin(t * this.sx + this.px) * this.ax;
      this.dy = this.y + Math.cos(t * this.sy + this.py) * this.ay;
    }
    draw() {
      pctx.fillStyle = `rgba(31,184,255,${this.alpha})`;
      pctx.fillRect(Math.round(this.dx), Math.round(this.dy), this.size, this.size);
    }
  }

  resize();
  for (let i = 0; i < COUNT; i++) pts.push(new Dot());

  // Track mouse relative to card
  document.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    dX = mx - lastMX; dY = my - lastMY;
    lastMX = mx; lastMY = my;
  });

  function loop(t) {
    dX *= 0.7; dY *= 0.7;
    pctx.clearRect(0, 0, pw, ph);
    pts.forEach(p => { p.update(t); p.draw(); });
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  window.addEventListener('resize', () => { resize(); });
})();

// ── PIXEL TEXT CARD ──
(function() {
  const card = document.getElementById('pixel-card');
  const canvas = document.getElementById('pixel-canvas');
  const ctx2 = canvas.getContext('2d');
  const DPR2 = window.devicePixelRatio || 1;
  const PX2 = 2;
  const DUR2 = 900;
  let animating = false;

  function resizePx() {
    const r = card.getBoundingClientRect();
    canvas.width  = r.width  * DPR2;
    canvas.height = r.height * DPR2;
    canvas.style.width  = r.width  + 'px';
    canvas.style.height = r.height + 'px';
  }

  function getPixelPts(text, font, cw, ch) {
    const tmp = document.createElement('canvas');
    tmp.width = cw; tmp.height = ch;
    const tc = tmp.getContext('2d');
    tc.font = font;
    tc.fillStyle = '#000';
    tc.textBaseline = 'middle';
    tc.textAlign = 'center';
    tc.fillText(text, cw / 2, ch / 2);
    const data = tc.getImageData(0, 0, cw, ch).data;
    const pts = [];
    for (let y = 0; y < ch; y += PX2)
      for (let x = 0; x < cw; x += PX2)
        if (data[(y * cw + x) * 4 + 3] > 100) pts.push({ x, y });
    return pts;
  }

  let currentParticles = [];
  let currentCW = 0, currentCH = 0;

  // Expose snap globally
  window._pixelSnapToEnd = () => {
    if (!currentParticles.length) return;
    ctx2.clearRect(0, 0, currentCW, currentCH);
    ctx2.fillStyle = 'rgba(0,0,0,1)';
    currentParticles.forEach(p => { ctx2.fillRect(p.tx, p.ty, PX2, PX2); });
  };

  function runPixelLoop() {
    if (animating) return;
    animating = true;
    resizePx();
    const cw = canvas.width, ch = canvas.height;
    currentCW = cw; currentCH = ch;
    const fontSize = Math.round(ch * 0.25);
    const font = `510 ${fontSize}px "SF Pro Display", -apple-system, sans-serif`;
    const pts = getPixelPts('pixel text', font, cw, ch);

    const particles2 = pts.map(p => ({
      tx: p.x, ty: p.y,
      x: p.x + (Math.random() - 0.5) * cw * 0.8,
      y: p.y + (Math.random() - 0.5) * ch * 0.6,
    }));
    currentParticles = particles2;

    let start = null;
    function tick(now) {
      if (!start) start = now;
      const t = Math.min((now - start) / DUR2, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      ctx2.clearRect(0, 0, cw, ch);
      ctx2.fillStyle = `rgba(0,0,0,${Math.min(ease * 1.5, 1)})`;
      particles2.forEach(p => {
        ctx2.fillRect(p.x + (p.tx - p.x) * ease, p.y + (p.ty - p.y) * ease, PX2, PX2);
      });
      if (t < 1 && !window._pixelPaused) {
        requestAnimationFrame(tick);
      } else if (window._pixelPaused) {
        window._pixelSnapToEnd();
        animating = false;
        window._restartPixel = () => { window._restartPixel = null; window._pixelSnapToEnd = null; setTimeout(runPixelLoop, 300); };
      } else {
        // Hold 1s then scatter and repeat
        setTimeout(() => {
          // Scatter out
          let start2 = null;
          function scatter(now2) {
            if (!start2) start2 = now2;
            const t2 = Math.min((now2 - start2) / 500, 1);
            const ease2 = Math.pow(t2, 2);
            ctx2.clearRect(0, 0, cw, ch);
            ctx2.fillStyle = `rgba(0,0,0,${1 - ease2})`;
            particles2.forEach(p => {
              ctx2.fillRect(p.tx + (p.x - p.tx) * ease2, p.ty + (p.y - p.ty) * ease2, PX2, PX2);
            });
            if (t2 < 1) requestAnimationFrame(scatter);
            else {
              ctx2.clearRect(0, 0, cw, ch);
              animating = false;
              if (!window._pixelPaused) setTimeout(runPixelLoop, 600);
              else window._restartPixel = () => { window._restartPixel = null; setTimeout(runPixelLoop, 300); };
            }
          }
          requestAnimationFrame(scatter);
        }, 1000);
      }
    }
    requestAnimationFrame(tick);
  }

  window.addEventListener('load', () => setTimeout(runPixelLoop, 300));
  window.addEventListener('resize', () => { if (!animating) runPixelLoop(); });
})();

// ── CURSOR CARD ──
(function() {
  const cursors2 = ['cursor_dog.png','cursor_cactus.png','cursor_cat.png','cursor_camera.png','cursor_cd.png','cursor_martini.png'];
  const card2   = document.getElementById('cursor-card');
  const overlay = document.getElementById('cursor-overlay');
  let idx = 0;
  let switching = false;

  function burstOrange(x, y) {
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('div');
      const angle = (i / 10) * Math.PI * 2;
      const size = 5 + Math.random() * 6;
      p.style.cssText = `position:fixed;width:${size}px;height:${size}px;border-radius:50%;background:#dc5a1e;pointer-events:none;z-index:9997;left:${x}px;top:${y}px;transform:translate(-50%,-50%);`;
      document.body.appendChild(p);
      const dist = 30 + Math.random() * 40;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      p.animate([
        { transform: `translate(-50%,-50%) translate(0,0)`, opacity: 1 },
        { transform: `translate(-50%,-50%) translate(${tx}px,${ty}px)`, opacity: 0 }
      ], { duration: 400 + Math.random() * 200, easing: 'cubic-bezier(0,0,0.2,1)', fill: 'forwards' })
        .onfinish = () => p.remove();
    }
  }

  function switchCursor() {
    if (switching) return;
    switching = true;
    const rect = overlay.getBoundingClientRect();
    burstOrange(rect.left + rect.width/2, rect.top + rect.height/2);
    idx = Math.floor(Math.random() * cursors2.length);
    overlay.style.transition = 'none';
    overlay.style.transform = 'translate(-4px,-4px) scaleX(0.4) scaleY(1.5)';
    setTimeout(() => {
      overlay.src = cursors2[idx];
      overlay.style.transform = 'translate(-4px,-4px) scaleX(1.4) scaleY(0.6)';
      setTimeout(() => {
        overlay.style.transition = 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)';
        overlay.style.transform = 'translate(-4px,-4px) scale(1)';
        setTimeout(() => { switching = false; }, 300);
      }, 80);
    }, 70);
  }

  card2.addEventListener('mouseenter', e => {
    overlay.src = cursors2[idx];
    overlay.style.display = 'block';
    overlay.style.left = e.clientX + 'px';
    overlay.style.top  = e.clientY + 'px';
    card2.style.cursor = 'none';
    cursorEl.style.opacity = '0';  // hide circular cursor
    switchCursor();
  });

  card2.addEventListener('mousemove', e => {
    overlay.style.left = e.clientX + 'px';
    overlay.style.top  = e.clientY + 'px';
  });

  card2.addEventListener('mouseleave', () => {
    overlay.style.display = 'none';
    cursorEl.style.opacity = '1';  // restore circular cursor
  });

  card2.addEventListener('click', () => switchCursor());
})();


// ── CHALK CARD ──
(function() {
  const card = document.getElementById('chalk-card');
  const canvas = document.getElementById('chalk-canvas');
  const ctx = canvas.getContext('2d');
  let last = null;
  let inside = false;

  function resize() {
    const r = card.getBoundingClientRect();
    canvas.width  = r.width;
    canvas.height = r.height;
    canvas.style.width  = r.width + 'px';
    canvas.style.height = r.height + 'px';
  }

  function chalkBrush(x, y, px, py) {
    const dx = x - px, dy = y - py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const steps = Math.max(1, Math.floor(dist / 1.5));
    const size = 10 + Math.random() * 4;
    for (let i = 0; i <= steps; i++) {
      const t = steps === 0 ? 0 : i / steps;
      const ix = px + dx * t;
      const iy = py + dy * t;
      for (let j = 0; j < 18; j++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * size * 0.5;
        const opacity = (0.08 + Math.random() * 0.18) * (1 - r / (size * 0.5));
        ctx.fillStyle = `rgba(220, 90, 30, ${opacity})`;
        ctx.fillRect(
          Math.round(ix + Math.cos(angle) * r),
          Math.round(iy + Math.sin(angle) * r),
          Math.random() < 0.5 ? 1 : 2,
          Math.random() < 0.5 ? 1 : 2
        );
      }
    }
  }

  resize();
  window.addEventListener('resize', resize);

  card.addEventListener('mouseenter', () => { inside = true; });
  card.addEventListener('mouseleave', () => { inside = false; last = null; });

  card.addEventListener('mousemove', e => {
    if (!inside) return;
    const r = card.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;
    if (last) {
      chalkBrush(x, y, last.x, last.y);
    }
    last = { x, y };
  });

  // Double click to clear
  card.addEventListener('dblclick', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
})();
